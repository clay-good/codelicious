[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "codelicious"
version = "1.0.0"
description = "Autonomous code generation engine powered by Open Weight HuggingFace models."
requires-python = ">=3.9"
authors = [
    {name = "Codelicious Team"},
]
dependencies = []

[project.optional-dependencies]
test = ["pytest>=7.0"]

[project.scripts]
codelicious = "codelicious.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]