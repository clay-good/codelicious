name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14-dev"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify CLI installs correctly
        run: codelicious --help

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Tests with coverage
        run: pytest tests/ -v --tb=short --cov=src/codelicious --cov-report=term-missing --cov-report=xml --cov-fail-under=90
        # Allow 3.14-dev to fail since it is pre-release
        continue-on-error: ${{ matrix.python-version == '3.14-dev' }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
        if: always()

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Security scan (bandit)
        # B101: assert used (test code pattern)
        # B110: try/except/pass (defensive catches)
        # B310: url open (expected - LLM API calls)
        # B404: import subprocess (expected - tool runner)
        # B603: subprocess without shell (expected - that's the safe way)
        # B607: partial path (expected - runs git/pytest by name)
        run: bandit -r src/codelicious/ -s B101,B110,B310,B404,B603,B607

      - name: Dependency audit
        # Audit runtime dependencies only (skip self since we're not on PyPI)
        # --strict: fail on warnings in addition to errors
        # CVE-2026-4539: pygments <=2.19.2 ReDoS in AdlLexer — no fix released yet, local-only attack vector
        run: pip-audit --strict --desc --ignore-vuln CVE-2026-4539
