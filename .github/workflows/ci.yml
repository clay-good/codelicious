name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Tests
        run: pytest tests/ -v --tb=short

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Security scan (bandit)
        # B101: assert used (test code pattern)
        # B110: try/except/pass (defensive catches)
        # B310: url open (expected - LLM API calls)
        # B404: import subprocess (expected - tool runner)
        # B603: subprocess without shell (expected - that's the safe way)
        # B607: partial path (expected - runs git/pytest by name)
        run: bandit -r src/codelicious/ -s B101,B110,B310,B404,B603,B607

      - name: Dependency audit
        # Audit runtime dependencies only (skip self since we're not on PyPI)
        run: pip-audit --desc
