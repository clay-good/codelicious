repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: ["check", "--fix"]
      - id: ruff-format
  - repo: https://github.com/PyCQA/bandit
    rev: "1.9.0"
    hooks:
      - id: bandit
        args: ["-r", "src/codelicious/", "-s", "B101,B110,B310,B404,B603,B607"]
